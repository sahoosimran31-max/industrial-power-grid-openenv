name: industrial_power_grid
version: "0.1.0"
description: "Industrial Power Grid Safety Environment"

# This points to your code
entry_point: server.industrial_power_grid_environment:PowerGridEnv

tasks:
  - id: easy_mode
    description: "Low demand: Meet demand with 1 source."
    score_threshold: 0.8
  - id: medium_mode
    description: "Medium demand: Balance 2 sources correctly."
    score_threshold: 0.9
  - id: hard_mode
    description: "High demand: All sources must be managed."
    score_threshold: 1.0